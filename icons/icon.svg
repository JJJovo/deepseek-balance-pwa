<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f6ef7"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <!-- 背景 -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- 货币符号 ¥ 或 钱包图标 -->
  <g transform="translate(256,220)" fill="none" stroke="white" stroke-width="24" stroke-linecap="round" stroke-linejoin="round">
    <!-- 钱包主体 -->
    <rect x="-140" y="-60" width="280" height="200" rx="20"/>
    <!-- 钱包扣 -->
    <rect x="-30" y="-60" width="60" height="16" rx="8" fill="white"/>
    <!-- ¥ 符号 -->
    <text x="0" y="110" text-anchor="middle" font-size="160" font-weight="800" font-family="sans-serif" fill="white" stroke="none">¥</text>
  </g>
</svg>
