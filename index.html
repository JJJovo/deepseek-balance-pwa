<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#0f1729">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="DS余额">
  <meta name="description" content="实时查看 DeepSeek API 账户余额">

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json">

  <!-- Apple Touch Icon -->
  <link rel="apple-touch-icon" href="/icons/icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%234f6ef7'/><text x='50' y='68' text-anchor='middle' font-size='52' fill='white'>💰</text></svg>">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="/css/style.css">

  <title>DeepSeek 余额查询</title>
</head>
<body>

  <!-- ==================== APP 容器 ==================== -->
  <div class="app-container">

    <!-- ========== 加载中视图 ========== -->
    <div id="view-loading" class="view active">
      <div class="loading-overlay" style="flex:1;display:flex;align-items:center;justify-content:center;">
        <div class="loading-spinner" style="width:40px;height:40px;border-width:3px;"></div>
      </div>
    </div>

    <!-- ========== 设置 API Key 视图 ========== -->
    <div id="view-setup" class="view">
      <div class="setup-container">
        <!-- 头部 -->
        <div class="setup-header">
          <div class="setup-logo">💰</div>
          <h1 class="setup-title">DeepSeek 余额查询</h1>
          <p class="setup-desc">输入你的 API Key，实时查看账户余额</p>
        </div>

        <!-- 输入区 -->
        <div class="input-group">
          <label class="input-label" for="api-key-input">API Key</label>
          <div class="input-wrapper">
            <input
              type="password"
              id="api-key-input"
              class="input-field"
              placeholder="sk-xxxxxxxxxxxxxxxxxxxxxxxx"
              autocomplete="off"
              autocorrect="off"
              autocapitalize="off"
              spellcheck="false"
            >
            <button id="toggle-password" class="input-toggle-password" aria-label="显示/隐藏">👁</button>
          </div>
          <p class="input-hint">
            在 <a href="https://platform.deepseek.com/api_keys" target="_blank" rel="noopener">DeepSeek 开放平台</a> 获取 API Key。Key 仅保存在你的设备本地。
          </p>
        </div>

        <!-- 错误提示 -->
        <div id="setup-error" class="error-toast" style="display:none;">
          <span class="error-icon">⚠️</span>
          <span class="error-text"></span>
        </div>

        <!-- 按钮 -->
        <button id="save-key-btn" class="btn btn-primary">
          <span>🔑</span> 验证并保存
        </button>

        <button id="clear-key-btn" class="btn btn-secondary" style="margin-top:12px;width:100%;">
          清除已保存的 Key
        </button>
      </div>

      <div class="app-footer">
        安全提示：API Key 仅存储在你的设备中
      </div>
    </div>

    <!-- ========== 余额仪表盘视图 ========== -->
    <div id="view-dashboard" class="view">

      <!-- 下拉刷新指示器 -->
      <div id="pull-indicator" class="pull-indicator">
        <span class="spinner-sm" style="display:none;"></span>
        <span class="pull-text">下拉刷新</span>
      </div>

      <!-- 工具栏 -->
      <div class="toolbar">
        <div class="toolbar-left">
          <span style="font-size:18px;">💰</span>
          <span style="font-weight:600;font-size:16px;">DeepSeek 余额</span>
        </div>
        <div class="toolbar-right">
          <span id="last-updated" class="last-updated">更新于 --</span>
          <button id="refresh-btn" class="btn-icon" aria-label="刷新" title="刷新">🔄</button>
          <button id="settings-btn" class="btn-icon" aria-label="设置" title="设置">⚙️</button>
        </div>
      </div>

      <!-- 错误提示 -->
      <div id="dashboard-error" class="error-toast" style="display:none;">
        <span class="error-icon">⚠️</span>
        <span class="error-text"></span>
      </div>

      <!-- 总余额 -->
      <div class="balance-hero">
        <div class="balance-hero-label">总余额</div>
        <div>
          <span id="total-balance" class="balance-hero-value">--</span>
          <span class="balance-hero-currency">CNY</span>
        </div>
        <div id="status-badge" class="balance-hero-status">
          加载中...
        </div>
      </div>

      <!-- 余额分类 -->
      <div class="balance-detail-cards">
        <!-- 充值余额 -->
        <div class="balance-detail-card">
          <div class="icon">💳</div>
          <div class="label">充值余额</div>
          <div class="value">
            <span id="topped-up-balance">--</span>
          </div>
        </div>
        <!-- 赠送余额 -->
        <div class="balance-detail-card">
          <div class="icon">🎁</div>
          <div class="label">赠送余额</div>
          <div class="value">
            <span id="granted-balance">--</span>
          </div>
        </div>
      </div>

      <!-- 底部信息 -->
      <div class="app-footer">
        下拉或点击 🔄 刷新 · 数据来源
        <a href="https://api.deepseek.com" target="_blank" rel="noopener">DeepSeek API</a>
      </div>
    </div>

  </div>

  <!-- ==================== Toast ==================== -->
  <div id="toast" class="toast"></div>

  <!-- ==================== JS ==================== -->
  <script src="/js/app.js"></script>

</body>
</html>
